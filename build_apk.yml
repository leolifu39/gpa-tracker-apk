name: Build Flutter APK (Phone-only)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Create Flutter project files (android + web)
        run: |
          flutter --version
          flutter create . --platforms=android,web --project-name=gpa_tracker --org=com.gpa.tracker
          rm -f lib/main.dart
          cp app_files/main.dart lib/main.dart
          cp app_files/pubspec.yaml pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpa-tracker-apk
          path: build/app/outputs/flutter-apk/app-release.apk
